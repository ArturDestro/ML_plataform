services:
  db:
    image: postgres:16-alpine
    container_name: mlplat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlplat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlplat}
      POSTGRES_DB: ${POSTGRES_DB:-mlplat}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlplat}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: mlplat-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mlplat}:${POSTGRES_PASSWORD:-mlplat}@db:5432/${POSTGRES_DB:-mlplat}
    volumes:
      - ./backend:/app
      - models_data:/app/storage/models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: mlplat-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  models_data: